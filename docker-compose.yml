version: '3.8'

services:
  pokemon-showdown:
    build: .
    container_name: pokemon-showdown-server
    ports:
      - "8000:8000"
    volumes:
      # Mount config directory to persist configuration changes
      - ./config:/app/config
      # Mount databases directory to persist data
      - ./databases:/app/databases
      # Mount logs directory to persist logs
      - ./logs:/app/logs
      # Mount dist directory to persist build output and avoid rebuilds
      - ps-dist:/app/dist
      # Mount node_modules to persist dependencies
      - ps-node-modules:/app/node_modules
    restart: unless-stopped
    environment:
      - NODE_ENV=production

volumes:
  ps-dist:
    driver: local
  ps-node-modules:
    driver: local
